            DM.save(); closeModal(); App.render(); showToast('Karyawan berhasil ditambahkan');
        },
        openEdit(id) {
            const emp = DM.data.employees.find(e => e.id === id);
            if (!emp) return;
            openModal(`
                <div class="modal-header"><h3 style="font-weight:800;">Edit Karyawan</h3><button class="btn-icon btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                <div class="modal-body">
                    <div class="form-group"><label class="form-label">Nama Lengkap</label><input type="text" class="form-input" id="m_emp_name" value="${emp.name}"></div>
                    <div class="form-group"><label class="form-label">Booth</label><select class="form-select" id="m_emp_booth">${DM.data.booths.map(b => `<option value="${b.id}" ${emp.booth_id===b.id?'selected':''}>${b.name}</option>`).join('')}</select></div>
                    <div class="form-group"><label class="form-label">Posisi</label><select class="form-select" id="m_emp_position"><option ${emp.position==='Kasir'?'selected':''}>Kasir</option><option ${emp.position==='Barista'?'selected':''}>Barista</option><option ${emp.position==='Koki'?'selected':''}>Koki</option><option ${emp.position==='Server'?'selected':''}>Server</option><option ${emp.position==='Supervisor'?'selected':''}>Supervisor</option></select></div>
                    <div class="form-group"><label class="form-label">Shift</label><select class="form-select" id="m_emp_shift"><option value="pagi" ${emp.shift==='pagi'?'selected':''}>Pagi (06:00 - 14:00)</option><option value="siang" ${emp.shift==='siang'?'selected':''}>Siang (14:00 - 22:00)</option><option value="malam" ${emp.shift==='malam'?'selected':''}>Malam (22:00 - 06:00)</option></select></div>
                    <div class="form-group"><label class="form-label">No. Telepon</label><input type="text" class="form-input" id="m_emp_phone" value="${emp.phone}"></div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="KaryawanModule.saveEdit(${id})">Simpan</button></div>
            `);
        },
        saveEdit(id) {
            const emp = DM.data.employees.find(e => e.id === id);
            if (!emp) return;
            emp.name = document.getElementById('m_emp_name').value.trim();
            emp.booth_id = parseInt(document.getElementById('m_emp_booth').value);
            emp.position = document.getElementById('m_emp_position').value;
            emp.shift = document.getElementById('m_emp_shift').value;
            emp.phone = document.getElementById('m_emp_phone').value.trim();
            DM.save(); closeModal(); App.render(); showToast('Data karyawan berhasil diperbarui');
        },
        toggleStatus(id) {
            const emp = DM.data.employees.find(e => e.id === id);
            if (!emp) return;
            emp.status = emp.status === 'active' ? 'inactive' : 'active';
            DM.save(); App.render(); showToast(`Karyawan ${emp.status === 'active' ? 'diaktifkan' : 'dinonaktifkan'}`, emp.status === 'active' ? 'success' : 'warning');
        }
    };

    // ============================================
    // MODULE: Stok CRUD
    // ============================================
    const StokModule = {
        openAdd() {
            openModal(`
                <div class="modal-header"><h3 style="font-weight:800;">Tambah Bahan Baku</h3><button class="btn-icon btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                <div class="modal-body">
                    <div class="form-group"><label class="form-label">Nama Bahan</label><input type="text" class="form-input" id="m_stok_name"></div>
                    <div class="form-group"><label class="form-label">Booth</label><select class="form-select" id="m_stok_booth">${DM.data.booths.map(b => `<option value="${b.id}">${b.name}</option>`).join('')}</select></div>
                    <div class="form-group"><label class="form-label">Kategori</label><select class="form-select" id="m_stok_cat"><option value="bahan_minuman">Bahan Minuman</option><option value="bahan_makanan">Bahan Makanan</option><option value="kemasan">Kemasan</option></select></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group"><label class="form-label">Stok Awal</label><input type="number" class="form-input" id="m_stok_stock" min="0" value="0"></div>
                        <div class="form-group"><label class="form-label">Satuan</label><input type="text" class="form-input" id="m_stok_unit" placeholder="kg, liter, pack"></div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                        <div class="form-group"><label class="form-label">Stok Minimum</label><input type="number" class="form-input" id="m_stok_min" min="0" value="5"></div>
                        <div class="form-group"><label class="form-label">Harga per Satuan</label><input type="number" class="form-input" id="m_stok_price" min="0" value="0"></div>
                    </div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="StokModule.saveAdd()">Simpan</button></div>
            `);
        },
        saveAdd() {
            const name = document.getElementById('m_stok_name').value.trim();
            const booth_id = parseInt(document.getElementById('m_stok_booth').value);
            const category = document.getElementById('m_stok_cat').value;
            const stock = parseInt(document.getElementById('m_stok_stock').value) || 0;
            const unit = document.getElementById('m_stok_unit').value.trim();
            const min_stock = parseInt(document.getElementById('m_stok_min').value) || 0;
            const price_per_unit = parseInt(document.getElementById('m_stok_price').value) || 0;
            if (!name || !unit) { showToast('Nama dan satuan wajib diisi', 'warning'); return; }
            DM.data.inventory.push({ id: DM.nextId('inventory'), name, booth_id, category, stock, unit, min_stock, price_per_unit });
            DM.save(); closeModal(); App.render(); showToast('Bahan baku berhasil ditambahkan');
        },
        openEdit(id) {
            const item = DM.data.inventory.find(i => i.id === id);
            if (!item) return;
            openModal(`
                <div class="modal-header"><h3 style="font-weight:800;">Edit Bahan Baku</h3><button class="btn-icon btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                <div class="modal-body">
                    <div class="form-group"><label class="form-label">Nama Bahan</label><input type="text" class="form-input" id="m_stok_name" value="${item.name}"></div>
                    <div class="form-group"><label class="form-label">Stok Saat Ini</label><input type="number" class="form-input" id="m_stok_stock" value="${item.stock}" min="0"></div>
                    <div class="form-group"><label class="form-label">Stok Minimum</label><input type="number" class="form-input" id="m_stok_min" value="${item.min_stock}" min="0"></div>
                    <div class="form-group"><label class="form-label">Harga per Satuan</label><input type="number" class="form-input" id="m_stok_price" value="${item.price_per_unit}" min="0"></div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="StokModule.saveEdit(${id})">Simpan</button></div>
            `);
        },
        saveEdit(id) {
            const item = DM.data.inventory.find(i => i.id === id);
            if (!item) return;
            item.name = document.getElementById('m_stok_name').value.trim();
            item.stock = parseInt(document.getElementById('m_stok_stock').value) || 0;
            item.min_stock = parseInt(document.getElementById('m_stok_min').value) || 0;
            item.price_per_unit = parseInt(document.getElementById('m_stok_price').value) || 0;
            DM.save(); closeModal(); App.render(); showToast('Stok berhasil diperbarui');
        },
        openRestock(id) {
            const item = DM.data.inventory.find(i => i.id === id);
            if (!item) return;
            openModal(`
                <div class="modal-header"><h3 style="font-weight:800;">Restock: ${item.name}</h3><button class="btn-icon btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                <div class="modal-body">
                    <div style="margin-bottom:16px;padding:12px;background:#FAFAF9;border-radius:8px;">
                        <div style="font-size:13px;color:var(--muted);">Stok saat ini</div>
                        <div style="font-size:24px;font-weight:900;">${item.stock} ${item.unit}</div>
                        <div style="font-size:12px;color:var(--muted);">Minimum: ${item.min_stock} ${item.unit}</div>
                    </div>
                    <div class="form-group"><label class="form-label">Jumlah Restock</label><input type="number" class="form-input" id="m_restock_qty" min="1" placeholder="Masukkan jumlah" autofocus></div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="StokModule.saveRestock(${id})">Restock</button></div>
            `);
        },
        saveRestock(id) {
            const item = DM.data.inventory.find(i => i.id === id);
            if (!item) return;
            const qty = parseInt(document.getElementById('m_restock_qty').value);
            if (!qty || qty <= 0) { showToast('Jumlah harus lebih dari 0', 'warning'); return; }
            item.stock += qty;
            DM.save(); closeModal(); App.render(); showToast(`Berhasil restock ${item.name} +${qty} ${item.unit}`);
        },
        remove(id) {
            if (!confirm('Hapus bahan baku ini?')) return;
            DM.data.inventory = DM.data.inventory.filter(i => i.id !== id);
            DM.save(); App.render(); showToast('Bahan baku berhasil dihapus', 'info');
        }
    };

    // ============================================
    // MODULE: Penjualan CRUD
    // ============================================
    const SalesModule = {
        openAdd() {
            let selectedBoothId = null;
            openModal(`
                <div class="modal-header"><h3 style="font-weight:800;">Catat Penjualan</h3><button class="btn-icon btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                <div class="modal-body">
                    <div class="form-group"><label class="form-label">Booth</label><select class="form-select" id="m_sale_booth" onchange="SalesModule.loadMenu()">${DM.data.booths.filter(b=>b.status==='active').map(b => `<option value="${b.id}">${b.name}</option>`).join('')}</select></div>
                    <div class="form-group"><label class="form-label">Metode Pembayaran</label><select class="form-select" id="m_sale_payment"><option value="tunai">Tunai</option><option value="digital">Digital (QRIS/Transfer)</option></select></div>
                    <div class="form-group">
                        <label class="form-label">Pilih Menu & Jumlah</label>
                        <div id="sale_menu_container" style="max-height:240px;overflow-y:auto;">
                            <p style="color:var(--muted);font-size:13px;">Pilih booth terlebih dahulu</p>
                        </div>
                    </div>
                    <div id="sale_total_display" style="padding:12px;background:var(--accent-light);border-radius:8px;font-weight:800;font-size:18px;color:var(--accent);text-align:right;">
                        Total: Rp 0
                    </div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Batal</button><button class="btn btn-primary" onclick="SalesModule.saveAdd()">Simpan Penjualan</button></div>
            `);
            this.loadMenu();
        },
        loadMenu() {
            const boothId = parseInt(document.getElementById('m_sale_booth').value);
            const menu = DM.getMenuByBooth(boothId);
            const container = document.getElementById('sale_menu_container');
            if (menu.length === 0) {
                container.innerHTML = '<p style="color:var(--muted);font-size:13px;">Belum ada menu di booth ini</p>';
                return;
            }
            container.innerHTML = menu.map(m => `
                <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
                    <div style="flex:1;">
                        <div style="font-weight:600;font-size:14px;">${m.name}</div>
                        <div style="font-size:12px;color:var(--accent);font-weight:700;">${DM.formatCurrency(m.price)}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;">
                        <button class="btn-icon btn-secondary" style="width:28px;height:28px;font-size:12px;" onclick="SalesModule.changeQty(${m.id},-1)">-</button>
                        <input type="number" id="sale_qty_${m.id}" value="0" min="0" style="width:40px;text-align:center;border:1px solid var(--border);border-radius:4px;font-size:14px;font-family:inherit;padding:4px;" onchange="SalesModule.updateTotal()" data-price="${m.price}" data-name="${m.name}">
                        <button class="btn-icon btn-secondary" style="width:28px;height:28px;font-size:12px;" onclick="SalesModule.changeQty(${m.id},1)">+</button>
                    </div>
                </div>
            `).join('');
            this.updateTotal();
        },
        changeQty(menuId, delta) {
            const input = document.getElementById(`sale_qty_${menuId}`);
            if (!input) return;
            let val = parseInt(input.value) || 0;
            val = Math.max(0, val + delta);
            input.value = val;
            this.updateTotal();
        },
        updateTotal() {
            let total = 0;
            document.querySelectorAll('[id^="sale_qty_"]').forEach(input => {
                const qty = parseInt(input.value) || 0;
                const price = parseInt(input.dataset.price) || 0;
                total += qty * price;
            });
            const display = document.getElementById('sale_total_display');
            if (display) display.innerHTML = `Total: ${DM.formatCurrency(total)}`;
        },
        saveAdd() {
            const boothId = parseInt(document.getElementById('m_sale_booth').value);
            const payment = document.getElementById('m_sale_payment').value;
            const items = [];
            let total = 0;

            document.querySelectorAll('[id^="sale_qty_"]').forEach(input => {
                const qty = parseInt(input.value) || 0;
                if (qty > 0) {
                    const price = parseInt(input.dataset.price) || 0;
                    const name = input.dataset.name;
                    items.push({ menu_item_id: parseInt(input.id.split('_')[2]), name, qty, price, subtotal: qty * price });
                    total += qty * price;
                }
            });

            if (items.length === 0) { showToast('Pilih minimal 1 menu', 'warning'); return; }

            const now = new Date();
            DM.data.sales.push({
                id: DM.nextId('sales'),
                booth_id: boothId,
                date: now.toISOString().split('T')[0],
                items,
                total,
                payment,
                created_at: now.toISOString()
            });
            DM.save(); closeModal(); App.render(); showToast(`Penjualan ${DM.formatCurrency(total)} berhasil dicatat`);
        },
        remove(id) {
            if (!confirm('Hapus transaksi ini?')) return;
            DM.data.sales = DM.data.sales.filter(s => s.id !== id);
            DM.save(); App.render(); showToast('Transaksi dihapus', 'info');
        }
    };

    // ============================================
    // INITIALIZATION
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
        // Set tanggal hari ini
        document.getElementById('todayDate').textContent = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // Inisialisasi data
        DM.init();

        // Navigasi sidebar
        document.querySelectorAll('.sidebar-nav a').forEach(a => {
            a.addEventListener('click', function(e) {
                e.preventDefault();
                App.navigate(this.dataset.page);
            });
        });

        // Mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        if (window.innerWidth <= 1024) menuToggle.style.display = 'flex';
        menuToggle.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
        window.addEventListener('resize', () => { menuToggle.style.display = window.innerWidth <= 1024 ? 'flex' : 'none'; });

        // Render halaman awal
        App.navigate('dashboard');
    });
    </script>
</body>
</html>
